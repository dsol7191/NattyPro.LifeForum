<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - NattyPro.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: #f4f6fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #0070f3;
            color: white;
            padding: 14px 24px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .container {
            max-width: 440px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .card-banner {
            height: 6px;
            background: linear-gradient(90deg, #0070f3, #004bb5);
        }
        .card-body { padding: 36px; }
        .icon { font-size: 44px; margin-bottom: 14px; text-align: center; }
        h2 { margin: 0 0 8px; font-size: 1.4rem; font-weight: 700; text-align: center; }
        p { color: #6b7280; font-size: 14px; line-height: 1.6; margin: 0 0 24px; text-align: center; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            background: #f4f6fb;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0070f3; background: white; }
        .submit-btn {
            width: 100%;
            background: #0070f3;
            color: white;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #005ed4; }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .back-link {
            display: block;
            margin-top: 16px;
            color: #6b7280;
            font-size: 13px;
            text-decoration: none;
            text-align: center;
        }
        .back-link:hover { color: #0070f3; }
        .password-hint {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header>NattyPro.Life</header>
    <div class="container">
        <div class="card">
            <div class="card-banner"></div>
            <div class="card-body">
                <div class="icon">🔒</div>
                <h2>Reset Password</h2>
                <p>Enter your new password below.</p>

                <div class="error-msg" th:if="${error}" th:text="${error}"></div>

                <!-- Invalid/expired token -->
                <div th:if="${error != null and token == null}">
                    <a href="/forgot-password" class="submit-btn" style="display:block; text-align:center; text-decoration:none; padding:13px;">
                        Request New Reset Link
                    </a>
                </div>

                <!-- Valid token - show form -->
                <form th:if="${token != null}" action="/reset-password" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="token" th:value="${token}"/>
                    <input type="password" name="password" placeholder="New password" required autofocus/>
                    <input type="password" name="confirmPassword" placeholder="Confirm new password" required/>
                    <p class="password-hint">Minimum 8 characters.</p>
                    <button type="submit" class="submit-btn">Reset Password</button>
                </form>

                <a href="/login" class="back-link">← Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
