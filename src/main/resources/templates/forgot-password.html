<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password - NattyPro.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: #f4f6fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #0070f3;
            color: white;
            padding: 14px 24px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .container {
            max-width: 440px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .card-banner {
            height: 6px;
            background: linear-gradient(90deg, #0070f3, #004bb5);
        }
        .card-body { padding: 36px; }
        .icon { font-size: 44px; margin-bottom: 14px; text-align: center; }
        h2 { margin: 0 0 8px; font-size: 1.4rem; font-weight: 700; text-align: center; }
        p { color: #6b7280; font-size: 14px; line-height: 1.6; margin: 0 0 24px; text-align: center; }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            background: #f4f6fb;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0070f3; background: white; }
        .submit-btn {
            width: 100%;
            background: #0070f3;
            color: white;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #005ed4; }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            text-align: center;
        }
        .back-link {
            display: block;
            margin-top: 16px;
            color: #6b7280;
            font-size: 13px;
            text-decoration: none;
            text-align: center;
        }
        .back-link:hover { color: #0070f3; }
    </style>
</head>
<body>
    <header>NattyPro.Life</header>
    <div class="container">
        <div class="card">
            <div class="card-banner"></div>
            <div class="card-body">
                <div class="icon">🔑</div>
                <h2>Forgot Password?</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
                <div class="success-msg" th:if="${message}" th:text="${message}"></div>
                <form action="/forgot-password" method="post" th:unless="${message}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="email" name="email" placeholder="Your email address" required autofocus/>
                    <button type="submit" class="submit-btn">Send Reset Link</button>
                </form>
                <a href="/login" class="back-link">← Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
