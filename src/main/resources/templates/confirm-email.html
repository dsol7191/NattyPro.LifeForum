<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirm Email - NattyPro.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: #f4f6fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #0070f3;
            color: white;
            padding: 14px 24px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .container {
            max-width: 440px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            padding: 40px;
        }
        .icon { font-size: 56px; margin-bottom: 16px; }
        h2 { margin: 0 0 12px; font-size: 1.4rem; font-weight: 700; }
        p { color: #6b7280; line-height: 1.6; margin-bottom: 24px; font-size: 14px; }
        .error-box {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: #0070f3;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background: #005ed4; }
    </style>
</head>
<body>
    <header>NattyPro.Life</header>
    <div class="container">
        <div class="card">
            <!-- Success -->
            <div th:if="${success}">
                <div class="icon">✅</div>
                <h2>Email Confirmed!</h2>
                <p>Your email has been successfully confirmed. You can now log in to NattyPro.Life.</p>
                <a href="/login" class="btn">Go to Login →</a>
            </div>

            <!-- Error -->
            <div th:unless="${success}">
                <div class="icon">❌</div>
                <h2>Invalid Link</h2>
                <div class="error-box" th:if="${error}" th:text="${error}"></div>
                <p>This confirmation link is invalid or has already been used.</p>
                <a href="/login" class="btn">Go to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
