<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chat PIN Management - NattyPro.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --blue: #0070f3;
            --blue-light: #e8f1ff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f6fb;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--blue);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,112,243,0.3);
        }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 700; }
        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .container {
            max-width: 800px;
            margin: 32px auto;
            padding: 0 20px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-header h2 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .generate-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .generate-btn:hover { background: #005ed4; }
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            display: grid;
            grid-template-columns: 140px 1fr 1fr 100px 80px;
            gap: 12px;
        }
        .pin-row {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 140px 1fr 1fr 100px 80px;
            gap: 12px;
            align-items: center;
            font-size: 14px;
            transition: background 0.15s;
        }
        .pin-row:last-child { border-bottom: none; }
        .pin-row:hover { background: var(--bg); }
        .pin-code {
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
            color: var(--blue);
        }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-used {
            background: #f3f4f6;
            color: var(--text-muted);
        }
        .status-available {
            background: #dcfce7;
            color: #166534;
        }
        .timestamp { color: var(--text-muted); font-size: 12px; }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .card-header { display: none; }
            .pin-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>NattyPro.Life — Admin</h1>
    <a href="/" class="back-btn">← Forum</a>
</header>

<div class="container">

    <div class="page-header">
        <h2>🔐 Chat Invite PINs</h2>
        <form action="/admin/pins/generate" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="generate-btn">+ Generate PIN</button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <span>PIN Code</span>
            <span>Created By</span>
            <span>Used By</span>
            <span>Status</span>
            <span>Created</span>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(pins)}">
            No PINs generated yet. Click "Generate PIN" to create one.
        </div>

        <div class="pin-row" th:each="pin : ${pins}">
            <span class="pin-code" th:text="${pin.pin}">XXXXXXXX</span>
            <span th:text="${pin.createdBy}">admin</span>
            <span th:text="${pin.usedBy != null ? pin.usedBy : '—'}">—</span>
            <span class="status-badge"
                  th:classappend="${pin.isUsed} ? 'status-used' : 'status-available'"
                  th:text="${pin.isUsed} ? 'Used' : 'Available'">Available</span>
            <span class="timestamp"
                  th:text="${#temporals.format(pin.createdAt, 'MMM dd')}">Date</span>
        </div>
    </div>

</div>
</body>
</html>
