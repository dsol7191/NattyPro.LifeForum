<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - My Forum</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; }
        .form-container { background: #f9f9f9; padding: 30px; border-radius: 5px; border: 1px solid #ccc; }
        h1 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; background: #007bff; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; text-align: center; }
        .register-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Login</h1>
        <p class="error" th:if="${param.error}">Invalid username or password</p>
		<div th:if="${param.registered}"
		     style="background:#dcfce7;color:#166534;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;">
		    ✅ Account created! You must confirm your email before you can log in — check your inbox and click the confirmation link.
		</div>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username or Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
			<a href="/forgot-password" style="display:block; text-align:center; margin-top:12px; color:#6b7280; font-size:13px; text-decoration:none;">
			    Forgot your password?
			</a>
        </form>
        <div class="register-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
