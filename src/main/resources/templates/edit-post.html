<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="'Edit: ' + ${post.title}">Edit Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --blue: #0070f3;
            --blue-light: #e8f1ff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f6fb;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        body { font-family: 'DM Sans', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        header {
            background: #0070f3; color: white; padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,112,243,0.3); position: sticky; top: 0; z-index: 100;
        }
        header a { text-decoration: none; color: white; }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 700; }
        .back-btn {
            background: rgba(255,255,255,0.15); color: white;
            border: 1px solid rgba(255,255,255,0.3); padding: 7px 16px;
            border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 500;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .container { max-width: 780px; margin: 32px auto; padding: 0 20px; }
        .edit-card {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden;
        }
        .edit-banner { height: 6px; background: linear-gradient(90deg, var(--blue), #004bb5); }
        .edit-body { padding: 28px; }
        .edit-body h2 { margin: 0 0 24px; font-size: 1.1rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        input[type="text"], select, textarea {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--blue); background: var(--white); }
        select { flex: 0 0 200px; }
        input[type="text"] { flex: 1; }
        textarea { resize: vertical; min-height: 300px; margin-bottom: 16px; }
        .btn-row { display: flex; gap: 10px; align-items: center; }
        .submit-btn {
            background: var(--blue); color: white; padding: 10px 24px;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 600; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
        }
        .submit-btn:hover { background: #005ed4; }
        .cancel-link { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        .cancel-link:hover { color: var(--text); }
        @media (max-width: 600px) {
            .container { margin: 16px auto; padding: 0 12px; }
            .edit-body { padding: 18px 16px; }
            .form-row { flex-direction: column; }
            select { flex: unset; }
            .submit-btn { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <a href="/"><h1>NattyPro.Life Forum</h1></a>
    <a th:href="@{/post/{id}(id=${post.id})}" class="back-btn">← Back to Post</a>
</header>

<div class="container">
    <div class="edit-card">
        <div class="edit-banner"></div>
        <div class="edit-body">
            <h2>Edit Post</h2>
            <form th:action="@{/post/{id}/edit(id=${post.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-row">
                    <input type="text" name="title" th:value="${post.title}" placeholder="Post title..." required/>
                    <select name="category" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="${cat}"
                                th:selected="${cat == post.category}">
                        </option>
                    </select>
                </div>
                <textarea name="content" placeholder="Post content..." required th:text="${post.content}"></textarea>
                <div class="btn-row">
                    <button type="submit" class="submit-btn">Save Changes</button>
                    <a th:href="@{/post/{id}(id=${post.id})}" class="cancel-link">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
