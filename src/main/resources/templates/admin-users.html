<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Management - NattyPro.Life</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --blue: #0070f3;
            --blue-light: #e8f1ff;
            --gold-gradient: linear-gradient(135deg, #FFD700, #FFA500);
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f6fb;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--blue);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,112,243,0.3);
        }
        header h1 { margin: 0; font-size: 1.2rem; font-weight: 700; }
        .header-links { display: flex; gap: 10px; }
        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .container {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 20px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-header h2 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .search-box {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            width: 240px;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--blue); }
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            display: grid;
            grid-template-columns: 1fr 1fr 100px 100px 120px 100px;
            gap: 12px;
        }
        .user-row {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr 100px 100px 120px 100px;
            gap: 12px;
            align-items: center;
            font-size: 14px;
            transition: background 0.15s;
        }
        .user-row:last-child { border-bottom: none; }
        .user-row:hover { background: var(--bg); }
        .username {
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pro-badge {
            display: inline-block;
            background: var(--gold-gradient);
            color: #000;
            font-weight: 700;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }
        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .role-admin { background: #fef3c7; color: #92400e; }
        .role-user { background: var(--blue-light); color: var(--blue); }
        .email { color: var(--text-muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toggle-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-grant { background: #dcfce7; color: #166534; }
        .btn-grant:hover { background: #bbf7d0; }
        .btn-revoke { background: #fee2e2; color: #dc2626; }
        .btn-revoke:hover { background: #fecaca; }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        @media (max-width: 700px) {
            .card-header { display: none; }
            .user-row { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <h1>NattyPro.Life — Admin</h1>
    <div class="header-links">
        <a href="/admin/pins" class="back-btn">🔐 Pins</a>
        <a href="/" class="back-btn">← Forum</a>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <h2>👥 User Management</h2>
        <input type="text" class="search-box" id="searchBox"
               placeholder="Search username..." onkeyup="filterUsers()"/>
    </div>

    <div class="card">
        <div class="card-header">
            <span>Username</span>
            <span>Email</span>
            <span>Role</span>
            <span>PRO Status</span>
            <span>PRO</span>
            <span>Delete</span>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(users)}">No users found.</div>

        <div class="user-row" th:each="user : ${users}" th:attr="data-username=${user.username}">
            <div class="username">
                <span th:text="${user.username}">username</span>
                <span class="pro-badge" th:if="${user.verifiedNattyPro}">PRO</span>
            </div>
            <div class="email" th:text="${user.email}">email</div>
            <div>
                <span class="role-badge"
                      th:classappend="${user.role == 'ADMIN'} ? 'role-admin' : 'role-user'"
                      th:text="${user.role}">USER</span>
            </div>
            <div>
                <span th:if="${user.verifiedNattyPro}"
                      style="color: #f5a623; font-weight: 700; font-size: 13px;">✅ Verified PRO</span>
                <span th:unless="${user.verifiedNattyPro}"
                      style="color: var(--text-muted); font-size: 13px;">Not verified</span>
            </div>
            <div>
                <form th:action="@{/admin/users/togglePro/{username}(username=${user.username})}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="toggle-btn"
                            th:classappend="${user.verifiedNattyPro} ? 'btn-revoke' : 'btn-grant'"
                            th:text="${user.verifiedNattyPro} ? 'Revoke PRO' : 'Grant PRO'">
                        Grant PRO
                    </button>
                </form>
            </div>
            <div>
                <form th:action="@{/admin/users/delete/{username}(username=${user.username})}"
                      method="post"
                      onsubmit="return confirm('Anonymize ' + '[[${user.username}]]' + '? This cannot be undone.');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="toggle-btn btn-revoke"
                            th:disabled="${user.role == 'ADMIN'}">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

    document.querySelectorAll(
