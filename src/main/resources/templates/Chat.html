<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${room} + ' Chat - NattyPro.Life'">Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --blue: #0070f3;
            --blue-light: #e8f1ff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f4f6fb;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--blue);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,112,243,0.3);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
        .room-badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }

        /* Rules banner */
        .rules-banner {
            background: #1a1a2e;
            color: rgba(255,255,255,0.7);
            padding: 8px 20px;
            font-size: 12px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .rules-banner span { flex-shrink: 0; }
        .rules-banner strong { color: white; margin-right: 6px; }

        /* Main layout */
        .chat-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
        }

        /* Room selector sidebar */
        .room-sidebar {
            width: 200px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 8px 4px 6px;
        }

        .room-link {
            display: block;
            padding: 9px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .room-link:hover { background: var(--white); color: var(--blue); }
        .room-link.active {
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 700;
            border-left-color: var(--blue);
        }

        /* Chat window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            min-width: 0;
        }

        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 2px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own { align-items: flex-end; }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .message.own .message-meta { flex-direction: row-reverse; }

        .message-sender { font-weight: 700; color: var(--text); }
        .message-time { font-family: 'DM Mono', monospace; }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            background: var(--bg);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message.own .message-bubble {
            background: var(--blue);
            color: white;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 4px;
        }

        .system-message {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 0;
            font-style: italic;
        }

        .error-message .message-bubble {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Input area */
        .chat-input {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            background: var(--bg);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            background: var(--white);
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: var(--blue); }

        .send-btn {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover { background: #005ed4; }

        /* Mobile */
        @media (max-width: 640px) {
            .room-sidebar { display: none; }
            .chat-layout { padding: 10px; }
            .rules-banner { font-size: 11px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>NattyPro.Life</h1>
        <span class="room-badge" th:text="'# ' + ${room}">room</span>
    </div>
    <a href="/" class="back-btn">← Forum</a>
</header>

<!-- Rules banner (shown at top of every session, not sticky) -->
<div class="rules-banner">
    <span><strong>Rules:</strong></span>
    <span th:each="rule : ${rules}" th:text="'• ' + ${rule}">rule</span>
</div>

<div class="chat-layout">

    <!-- Room Selector -->
    <div class="room-sidebar">
        <div class="sidebar-title">Chat Rooms</div>
        <a href="/chat/global" class="room-link" th:classappend="${room == 'global'} ? 'active' : ''">🌐 Global</a>
        <a href="/chat/training" class="room-link" th:classappend="${room == 'training'} ? 'active' : ''">💪 Training</a>
        <a href="/chat/nutrition" class="room-link" th:classappend="${room == 'nutrition'} ? 'active' : ''">🍎 Nutrition</a>
        <a href="/chat/recovery" class="room-link" th:classappend="${room == 'recovery'} ? 'active' : ''">😴 Recovery</a>
        <a href="/chat/mindset" class="room-link" th:classappend="${room == 'mindset'} ? 'active' : ''">🧠 Mindset</a>
        <a href="/chat/prep-files" class="room-link" th:classappend="${room == 'prep-files'} ? 'active' : ''">📁 Prep Files</a>
        <a href="/chat/coaches-corner" class="room-link" th:classappend="${room == 'coaches-corner'} ? 'active' : ''">🎓 Coaches Corner</a>
        <a href="/chat/self-promotion" class="room-link" th:classappend="${room == 'self-promotion'} ? 'active' : ''">📣 Self Promotion</a>
        <a href="/chat/random-side-quests" class="room-link" th:classappend="${room == 'random-side-quests'} ? 'active' : ''">🎲 Random</a>
    </div>

    <!-- Chat Window -->
    <div class="chat-window">
        <div class="chat-header">
            <span><span class="online-dot"></span> Live Chat</span>
            <span style="font-size: 11px;" th:text="'# ' + ${room}">room</span>
        </div>

        <div class="messages" id="messages">
            <div class="system-message">You joined <strong th:text="'#' + ${room}">room</strong>. Be respectful!</div>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput"
                   placeholder="Type a message..."
                   maxlength="500"
                   autocomplete="off"/>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<!-- SockJS + STOMP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    const room = [[${room}]];
    const username = [[${username}]];
    let stompClient = null;

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // silence debug logs

        stompClient.connect({}, function(frame) {
            stompClient.subscribe('/topic/chat/' + room, function(message) {
                const data = JSON.parse(message.body);
                showMessage(data);
            });
        }, function(error) {
            setTimeout(connect, 5000); // auto-reconnect
        });
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content || !stompClient) return;

        stompClient.send('/app/chat/' + room, {}, JSON.stringify({ content: content }));
        input.value = '';
    }

    function showMessage(data) {
        const messages = document.getElementById('messages');

        if (data.type === 'error') {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.style.color = '#dc2626';
            div.textContent = '⚠️ ' + data.content;
            messages.appendChild(div);
        } else {
            const isOwn = data.sender === username;
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');

            div.innerHTML = `
                <div class="message-meta">
                    <span class="message-sender">${data.sender}</span>
                    <span class="message-time">${data.time}</span>
                </div>
                <div class="message-bubble">${escapeHtml(data.content)}</div>
            `;
            messages.appendChild(div);
        }

        // Auto scroll to bottom
        messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // Send on Enter key
    document.getElementById('messageInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    connect();
</script>

</body>
</html>
